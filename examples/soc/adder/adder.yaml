# adder — a standalone block bench, reused as a subsystem block by ../soc.yaml.
project:
  name: adder
  author: QuickUVM
  year: 2026

dut:
  name: adder
  clock: clk
  reset: ''
  combinational: true

clock:
  period: 10
  unit: ns

agents:
  - name: a
    interface: a_if
    sequence_item: a_seq_item
    ports:
      inputs:
        - {name: din,  width: 8}
      outputs:
        - {name: dout, width: 8}

tests:
  - {name: adder_test, num_items: 30}
