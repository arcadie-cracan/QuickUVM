# mul — a CLOCKED leaf block (registered dout = din << 1) on its OWN 8 ns clock +
# external reset (a DIFFERENT clock domain than acc). The subsystem tb_top gives it
# its own clkgen (mul_clk @8ns) + reset generator (mul_rst_n), independent of acc.
project: {name: mul, author: QuickUVM, year: 2026}
dut: {name: mul, clock: clk, reset: rst_n, external_reset: true}
clock: {period: 8, unit: ns}
agents:
  - name: m
    interface: m_if
    sequence_item: m_item
    ports:
      inputs:  [{name: din,  width: 8}]
      outputs: [{name: dout, width: 8}]
tests:
  - {name: mul_test, num_items: 30}
