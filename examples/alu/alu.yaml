project:
  name: alu_tb
  author: qa@example.com
dut:
  name: alu
  clock: clk
  reset: ''
  combinational: true
clock:
  period: 10
  unit: ns
agents:
  - name: alu
    interface: alu_if
    sequence_item: alu_seq_item
    seq_item_style: manual
    active: true
    ports:
      inputs:
        - {name: a,  width: 8, randomize: true}
        - {name: b,  width: 8, randomize: true}
        # Black box: the TB declares its OWN op_e enum from the interface spec
        # (opcode 0=ADD .. 7=SLT). It does NOT import the DUT's alu_pkg — a wrong
        # DUT encoding would then be caught, not mirrored. The typed enum field
        # also self-constrains randomization to the 8 legal opcodes (no sequence
        # constraint needed).
        - name: op
          width: 4
          randomize: true
          enum: {ADD: 0, SUB: 1, AND: 2, OR: 3, XOR: 4, SLL: 5, SRL: 6, SLT: 7}
      outputs:
        - {name: result,   width: 8}
        - {name: zero,     width: 1}
        - {name: carry,    width: 1}
        - {name: negative, width: 1}
        - {name: overflow, width: 1}
tests:
  - name: rand_test
    num_items: 1000
# V1 — functional coverage from fields. Black box: the bins encode the spec's
# interesting operand values (corners + the bulk range), independent of the DUT.
# The op coverpoint auto-bins one-per-opcode (enum); the crosses ask whether each
# opcode was exercised against each operand corner. `goal` sets the closure target;
# ignore_bins drop a don't-care opcode and transition bins add temporal (a => b)
# coverage on the carry. (See examples/packet for enforceable illegal_bins, which
# need a field whose illegal values are storable — an enum coverpoint can only bin
# its own labels.)
coverage_models:
  - agent: alu
    goal: 90                            # option.goal — closure target (percent)
    coverpoints:
      - field: op                       # enum -> auto one bin per opcode, plus:
        ignore_bins:
          - {name: slt_wip, value: 7}          # SLT (op 7) out of scope this regression
      - field: a
        bins:
          - {name: zero, value: 0}
          - {name: max,  value: 255}
          - {name: mid,  range: [1, 254]}
      - field: b
        bins:
          - {name: zero, value: 0}
          - {name: max,  value: 255}
          - {name: mid,  range: [1, 254]}
      - field: carry                    # 1-bit output: bins + toggle transitions
        bins:
          - {name: lo, value: 0}
          - {name: hi, value: 1}
        transitions:
          - {name: rise, seq: "0 => 1"}
          - {name: fall, seq: "1 => 0"}
    crosses:
      - [op, a]
      - [op, b]
