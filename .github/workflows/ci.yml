name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Generator codebase: lint, format, type-check, unit tests ──────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: mypy
        run: mypy
      - name: pytest
        run: pytest -q

  # ── Byte-identity: every committed example regenerates to itself ──────────
  # The shipped examples/<x>/gen/ trees must reproduce byte-for-byte from their
  # <x>.yaml — the "output changes only when a feature is used" discipline. The
  # python job's pytest (test_example_byte_identity.py) covers this in-process;
  # this job is the end-to-end suspenders: it regenerates EVERY committed example
  # in place via the real CLI and fails on any drift (modified OR new files).
  example-byte-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e .
      - name: Regenerate every committed example in place
        run: |
          set -euo pipefail
          for ex in $(git ls-files 'examples/**/gen/**' | sed 's#/gen/.*##' | sort -u); do
            name=$(basename "$ex")
            quick-uvm generate -c "$ex/$name.yaml" -o "$ex/gen" --no-backup
          done
      - name: Assert no drift from committed gen/
        run: |
          if [ -n "$(git status --porcelain -- examples)" ]; then
            echo "::error::Committed examples drifted from generator output — regenerate and commit:"
            git status --porcelain -- examples
            git diff -- examples | head -300
            exit 1
          fi

  # ── Generated SystemVerilog: must be Verible-lint-clean and formatted ─────
  # Hard gate on the *product*: every release ships UVM that passes a standard
  # public linter. See docs/style_systemverilog.md.
  #
  # NB: only verible-verilog-LINT is gated. verible-verilog-format is deliberately
  # NOT used — it fights the Paradigm-Works column alignment we adopted as the
  # baseline and (as of v0.0-4053) corrupts `uvm_*` macro calls lacking a trailing
  # ';' (drops their arguments and emits unparseable output). Formatting style is
  # enforced via the lint rules + docs/style_systemverilog.md instead.
  #
  # WHAT THIS JOB CANNOT DO: verible is a style/syntax linter, not a compiler. It
  # accepts generated SV that a real simulator rejects — a coverage-handle bug
  # (`<agent>_cov <agent>_cov;`, a member shadowing its own type, then used as
  # `<agent>_cov::type_id::create()`) shipped straight through it and only died at
  # Xcelium compile (*E,NOPBIND). Verilator --lint-only is blind to it too, and
  # Icarus rejects the CLEAN code, so no free simulator closes the gap here. Two
  # things do, and neither is this job:
  #   * tests/test_no_type_shadowing.py — targeted static check for that bug class,
  #     runs in the `python` job above (free, no licence). ENFORCED.
  #   * scripts/xrun_gate.sh — the real compiler over all 28 examples. Needs a
  #     Cadence licence, so hosted CI cannot run it; run it before pushing.
  # See docs/parity_roadmap.md § R1.
  generated-sv:
    runs-on: ubuntu-latest
    env:
      # Pin a known-good Verible release; bump deliberately.
      VERIBLE_VERSION: v0.0-4053-g89d4d98a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e .

      - name: Install Verible
        run: |
          url="https://github.com/chipsalliance/verible/releases/download/${VERIBLE_VERSION}/verible-${VERIBLE_VERSION}-linux-static-x86_64.tar.gz"
          curl -fsSL "$url" | tar -xz
          echo "$PWD/verible-${VERIBLE_VERSION}/bin" >> "$GITHUB_PATH"

      # EXHAUSTIVE: lint every committed example, not a hand-picked list.
      #
      # The per-feature steps below grew one config at a time, and the list went stale the
      # moment a feature landed that none of them exercised. That is not hypothetical: the
      # responder driver's DEAD_RESPONDER / SILENT_RESPONDER / EMPTY_TRANSFER guards shipped
      # with `\` line continuations (forbidden) and CI was green, because not one of the
      # hand-picked configs has a responder agent. A committed example even carried a
      # leftover debug `$display` past review for the same reason.
      #
      # The committed trees also contain the hand-written pragma code, so this lints what
      # actually ships — which is what caught both of the above.
      - name: Verible lint (EVERY committed example)
        run: |
          fail=0
          for d in examples/*/gen; do
            out=$(verible-verilog-lint --rules_config .verible-lint.rules \
                    "$d"/*.sv "$d"/*.svh 2>&1) || true
            if [ -n "$out" ]; then
              echo "== $(basename "$(dirname "$d")")"
              echo "$out"
              fail=1
            fi
          done
          exit $fail

      - name: Generate the example testbench
        run: quick-uvm generate -c examples/simple_reg/simple_reg.yaml -o gen_tb

      - name: Verible lint (generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_tb/*.sv gen_tb/*.svh

      # Also gate the S1 enum path (typed transaction fields): the alu example
      # exercises a generated `<name>_e` typedef, a typed `rand` field, the
      # logic->enum monitor `$cast`, and enum-aware coverpoints — none of which
      # the plain simple_reg config covers.
      - name: Generate the enum-field example (S1)
        run: quick-uvm generate -c examples/alu/alu.yaml -o gen_alu

      - name: Verible lint (enum-path generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_alu/*.sv gen_alu/*.svh

      # Gate the S2 sequence-library path: the barrel_shifter example generates a
      # random + incrementing library sequence and a test that selects one.
      - name: Generate the sequence-library example (S2)
        run: quick-uvm generate -c examples/barrel_shifter/barrel_shifter.yaml -o gen_bs

      - name: Verible lint (sequence-library generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_bs/*.sv gen_bs/*.svh

      # Gate the C2 virtual-sequence path: the multi-agent fifo example generates
      # <dut>_virtual_sequencer / <dut>_base_vseq / sequential + parallel vseqs and a
      # two-interface DUT connection.
      - name: Generate the multi-agent example (C2)
        run: quick-uvm generate -c examples/fifo/fifo.yaml -o gen_fifo

      - name: Verible lint (virtual-sequence generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_fifo/*.sv gen_fifo/*.svh

      # Gate the K0 DPI-C reference-model path: the sat_adder example generates the
      # SV marshaling bridge (import "DPI-C" ...) + a C stub. Lint the generated SV.
      - name: Generate the DPI-C reference-model example (K0)
        run: quick-uvm generate -c examples/sat_adder/sat_adder.yaml -o gen_sat

      - name: Verible lint (DPI-C bridge generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_sat/*.sv gen_sat/*.svh

      # Gate the S1 rich-stimulus path: the packet example generates a var-length
      # payload field (rand byte[]) + a transaction-level `trans_c` constraint block.
      - name: Generate the rich-stimulus example (S1)
        run: quick-uvm generate -c examples/packet/packet.yaml -o gen_pkt

      - name: Verible lint (rich-stimulus generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_pkt/*.sv gen_pkt/*.svh

      # Gate the S1 packed-composite path: the vec_unit example generates a packed
      # struct typedef + a packed-array transaction field (raw bits on the interface).
      - name: Generate the packed-composite example (S1)
        run: quick-uvm generate -c examples/vec_unit/vec_unit.yaml -o gen_vu

      - name: Verible lint (packed-composite generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_vu/*.sv gen_vu/*.svh

      # Gate the S1 rand_mode path: the gated_add example declares a rand field with
      # rand_mode disabled by default (a rand_mode(0) call in the transaction new()).
      - name: Generate the rand_mode example (S1)
        run: quick-uvm generate -c examples/gated_add/gated_add.yaml -o gen_ga

      - name: Verible lint (rand_mode generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_ga/*.sv gen_ga/*.svh

      # Gate the C5 RAL/CSR-test path: the regfile example generates the per-kind
      # csr_<kind>_test classes (each running a UVM built-in register sequence), the
      # backdoor add_hdl_path wiring, and the bus_adapter handle. Also lint the
      # committed external reg block + DUT so the runnable RAL example stays clean.
      - name: Generate the RAL/CSR-test example (C5)
        run: quick-uvm generate -c examples/regfile/regfile.yaml -o gen_regfile

      - name: Verible lint (RAL/CSR-test generated SV/SVH + reg block)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_regfile/*.sv gen_regfile/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules \
            examples/regfile/ral/regfile_ral_pkg.sv examples/regfile/rtl/regfile.sv

      # Gate the A2 two-stream out-of-order scoreboard path: the reqrsp example
      # generates the cross-type predictor predict(req)→rsp, the monitor emit_when
      # gate, the queue-per-key (match: out_of_order) comparator, and the
      # max_latency window check.
      - name: Generate the two-stream out-of-order scoreboard example (A2)
        run: quick-uvm generate -c examples/reqrsp/reqrsp.yaml -o gen_reqrsp

      - name: Verible lint (two-stream-scoreboard generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_reqrsp/*.sv gen_reqrsp/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/reqrsp/rtl/reqrsp.sv

      # Gate the M1 multi-clock/multi-reset path: the mclk example is a two-clock-domain
      # bench (clk_sys @10, clk_io @6) with one external reset per domain. The `clock:`
      # list splits into a parameterized clkgen instantiated per domain; each reset
      # generator syncs to its clock; each interface + driver/monitor is bound and
      # reset-gated to its agent's own domain.
      - name: Generate the multi-clock/multi-reset example (M1)
        run: quick-uvm generate -c examples/mclk/mclk.yaml -o gen_mclk

      - name: Verible lint (multi-clock generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_mclk/*.sv gen_mclk/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/mclk/rtl/mclk.sv

      # Gate the M1 mixed-unit path: the mxclk example has two clock domains in DIFFERENT
      # time units (clk_fast @500ps, clk_slow @10ns). QuickUVM resolves one -timescale at
      # the finest unit (ps) and scales each clock's period + drive skew into it
      # (clkgen #(500) and #(10000)).
      - name: Generate the mixed-unit-clock example (M1)
        run: quick-uvm generate -c examples/mxclk/mxclk.yaml -o gen_mxclk

      - name: Verible lint (mixed-unit generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_mxclk/*.sv gen_mxclk/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/mxclk/rtl/mxclk.sv

      # Gate the M1 multi-agent-driven-reset path: the dualreg example has two registered
      # lanes on one clock, each reset DRIVEN by its own agent's sequences at its own
      # polarity — agent a an active-low reset, agent b an active-high reset. Each agent's
      # `reset_port` names its reset input; the driver parks it, sequences constrain it
      # inactive, and the monitor re-samples it, all at that agent's polarity.
      - name: Generate the multi-agent-driven-reset example (M1)
        run: quick-uvm generate -c examples/dualreg/dualreg.yaml -o gen_dualreg

      - name: Verible lint (multi-agent-driven-reset generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_dualreg/*.sv gen_dualreg/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/dualreg/rtl/dualreg.sv

      # Gate the A2 multi-transaction-type path: the splitter example has >=2
      # scoreboards, so each gets its own typed predictor/comparator/scoreboard set
      # (<dut>_<sbname>_*) for a DUT with two different-typed output channels.
      - name: Generate the multi-transaction-type example (A2)
        run: quick-uvm generate -c examples/splitter/splitter.yaml -o gen_splitter

      - name: Verible lint (multi-scoreboard generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_splitter/*.sv gen_splitter/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/splitter/rtl/splitter.sv

      # Gate the F2 packaged-layout path: the vip example emits a standalone
      # <agent>_pkg, a <dut>_env_pkg, and a <dut>_test_pkg (+ per-package .f files)
      # instead of the flat <dut>_tb_pkg.
      - name: Generate the packaged-layout example (F2)
        run: quick-uvm generate -c examples/vip/vip.yaml -o gen_vip

      - name: Verible lint (packaged-layout generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_vip/*.sv gen_vip/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/vip/rtl/vip.sv

      # Gate the C3 parameterized-VIP path: the pwidth example makes the agent's
      # interface + all UVM classes #(W)-parameterized (uvm_*_param_utils, a
      # parameterized virtual interface / config_db), with port widths referencing W.
      - name: Generate the parameterized-VIP example (C3)
        run: quick-uvm generate -c examples/pwidth/pwidth.yaml -o gen_pwidth

      - name: Verible lint (parameterized-VIP generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_pwidth/*.sv gen_pwidth/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/pwidth/rtl/pwidth.sv

      # Gate the C3 multi-instantiation path: the twowidth example instantiates ONE
      # parameterized VIP twice (io8 at W=8, io16 at W=16) in a single bench — two
      # interfaces, two DUTs, two agents and a concrete scoreboard set per instance.
      - name: Generate the multi-instantiation example (C3)
        run: quick-uvm generate -c examples/twowidth/twowidth.yaml -o gen_twowidth

      - name: Verible lint (multi-instantiation generated SV/SVH + DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_twowidth/*.sv gen_twowidth/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/twowidth/rtl/twowidth.sv

      # Gate the H1 sub-environments path: the soc example composes two child block
      # envs (adder + inverter, each an external config) into one subsystem bench —
      # a top env instantiating both block envs, a top virtual sequencer collecting
      # their agent sequencers, and a top vseq driving both blocks.
      - name: Generate the sub-environments example (H1)
        run: quick-uvm generate -c examples/soc/soc.yaml -o gen_soc

      - name: Verible lint (sub-environments generated SV/SVH + block DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_soc/*.sv gen_soc/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules \
            examples/soc/adder/rtl/adder.sv examples/soc/inverter/rtl/inverter.sv

      # Gate the H1 parameter-propagation path: the psoc example composes two
      # PARAMETERIZED blocks, each propagated to a different width via a per-subenv
      # `params:` override (dp at W=8, mac at W=16) — the block's VIP, scoreboard,
      # interface and DUT are all generated + instantiated at the propagated width.
      - name: Generate the parameter-propagation example (H1)
        run: quick-uvm generate -c examples/psoc/psoc.yaml -o gen_psoc

      - name: Verible lint (parameter-propagation generated SV/SVH + block DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_psoc/*.sv gen_psoc/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules \
            examples/psoc/dp/rtl/dp.sv examples/psoc/mac/rtl/mac.sv

      # Gate the H1 cross-block-scoreboard path: the pipe example composes a two-stage
      # pipeline (add -> inv) with an auto-generated `connections:` wire and a
      # cross-block scoreboard (A2 two-stream, in-order) that predicts stage 2's
      # output from stage 1's stream. Stage 2's agent is passive (its input is
      # driven by the connection).
      - name: Generate the cross-block-scoreboard example (H1)
        run: quick-uvm generate -c examples/pipe/pipe.yaml -o gen_pipe

      - name: Verible lint (cross-block-scoreboard generated SV/SVH + block DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_pipe/*.sv gen_pipe/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules \
            examples/pipe/add/rtl/add.sv examples/pipe/inv/rtl/inv.sv

      # Gate the H1 same-block-reused-at-N-widths path: the channels example composes
      # the SAME parameterized `chan` block config twice (lo at W=8, hi at W=16).
      # QuickUVM auto-namespaces the two copies (lo_*/hi_*) so their classes don't
      # collide, while both reuse the one unprefixed `chan` RTL module at #(8)/#(16).
      - name: Generate the same-block-reused example (H1)
        run: quick-uvm generate -c examples/channels/channels.yaml -o gen_channels

      - name: Verible lint (same-block-reused generated SV/SVH + reused DUT)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_channels/*.sv gen_channels/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/channels/chan/rtl/chan.sv

      # Gate the H1 nested-subenvs path: the nested example is a 3-level hierarchy —
      # top 'nested' composes clusterA + clusterB, each itself composing two leaf
      # blocks. Exercises the recursive generation, hierarchical vsqr/vseq (top runs
      # cluster vseqs), the nested config-db tree, and the flattened tb_top.
      - name: Generate the nested-subenvs example (H1)
        run: quick-uvm generate -c examples/nested/nested.yaml -o gen_nested

      - name: Verible lint (nested-subenvs generated SV/SVH + leaf DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_nested/*.sv gen_nested/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/nested/rtl/*.sv

      # Gate the H1 parameterized/reused-nested-subsystem path: the nsoc example
      # composes the SAME parameterized `chan` cluster (adder + shifter) twice — lo at
      # W=8, hi at W=16. Exercises recursive namespace prefixing (lo_*/hi_* down the
      # whole cluster subtree) + param broadcast to grandchild agents, with the reused
      # leaf RTL modules recovered unprefixed.
      - name: Generate the parameterized-reused-nested example (H1)
        run: quick-uvm generate -c examples/nsoc/nsoc.yaml -o gen_nsoc

      - name: Verible lint (parameterized-reused-nested generated SV/SVH + DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_nsoc/*.sv gen_nsoc/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/nsoc/rtl/*.sv

      # Gate the H1 cross-LEVEL connections/scoreboards path: the xpipe example wires
      # and scoreboards across nested subsystems — a top wire reaches into two clusters
      # (stg1.add.dout -> stg2.inv.din) and a cross-level scoreboard predicts inv.dout
      # from add's stream. Exercises dotted-path endpoint resolution (flattened tb_top
      # signal names for the wire; a dotted child-env handle chain for the scoreboard).
      - name: Generate the cross-level-connections example (H1)
        run: quick-uvm generate -c examples/xpipe/xpipe.yaml -o gen_xpipe

      - name: Verible lint (cross-level generated SV/SVH + leaf DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_xpipe/*.sv gen_xpipe/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/xpipe/rtl/*.sv

      # Gate the H1 cross-level-into-REUSED-subtree path: the dsoc example reuses the
      # SAME `lane` cluster (src + snk) twice (left/right, auto-namespaced) and rings the
      # instances across the hierarchy — each lane's src drives the OTHER lane's snk.
      # Endpoints descend into the namespaced subtrees by subenv path and name the leaf
      # agent by its ORIGINAL name (sa/ka), which resolves to the prefixed handle.
      - name: Generate the cross-level-into-reused example (H1)
        run: quick-uvm generate -c examples/dsoc/dsoc.yaml -o gen_dsoc

      - name: Verible lint (cross-level-into-reused generated SV/SVH + reused DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_dsoc/*.sv gen_dsoc/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/dsoc/rtl/*.sv

      # Gate the H1 x M1 clocked-subsystem path: the csoc example composes TWO CLOCKED
      # leaf blocks (acc @10ns + mul @8ns) into one subsystem. The flattened tb_top
      # generates a pathname-prefixed clock + reset + parameterized clkgen + reset
      # generator per clocked leaf, each interface/DUT bound and each driver/monitor
      # reset-gated to its own leaf's domain.
      - name: Generate the clocked-subsystem example (H1 x M1)
        run: quick-uvm generate -c examples/csoc/csoc.yaml -o gen_csoc

      - name: Verible lint (clocked-subsystem generated SV/SVH + clocked leaf DUTs)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_csoc/*.sv gen_csoc/*.svh
          verible-verilog-lint --rules_config .verible-lint.rules examples/csoc/rtl/*.sv
