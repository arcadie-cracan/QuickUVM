project:
  name: axi_read_tb
  author: qa@example.com

dut:
  name: axi_read
  clock: clk
  reset: rst_n
  external_reset: true

clock:
  period: 10
  unit: ns

agents:
  - name: rd
    interface: rd_if
    sequence_item: rd_item
    seq_item_style: manual
    active: true

    mode: responder
    request_valid: arvalid     # sampled: DUT asserts a read-address request
    # NOTE: no idle: block  -> on_request (blocking) shape

    ports:
      inputs:                  # driven = the RESPONSE channel (R)
        - {name: rvalid, width: 1,  randomize: true}
        - {name: rid,    width: 4,  randomize: true}
        - {name: rdata,  width: 32, randomize: true}
        - {name: rlast,  width: 1,  randomize: true}
      outputs:                 # sampled = the REQUEST channel (AR)
        - {name: arvalid, width: 1}
        - {name: arid,    width: 4}
        - {name: araddr,  width: 32}
        - {name: arlen,   width: 8}

analysis:
  coverage: []
  scoreboards: []   # the DUT master self-checks; no QuickUVM scoreboard

tests:
  - {name: rand_test, num_items: 20}
