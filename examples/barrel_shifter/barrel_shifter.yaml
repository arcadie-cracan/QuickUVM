project:
  name: barrel_shifter_tb
  author: qa@example.com

dut:
  name: barrel_shifter
  clock: clk           # testbench cadence only — the DUT is combinational
  reset: ''            # no reset
  combinational: true  # purely combinational DUT

clock:
  period: 10
  unit: ns

agents:
  - name: bs
    interface: bs_if
    sequence_item: bs_seq_item
    seq_item_style: manual
    active: true
    ports:
      inputs:
        - {name: data_in, width: 32, randomize: true}
        - {name: amt,     width: 5,  randomize: true}
        - {name: op,      width: 3,  randomize: true}
      outputs:
        - {name: data_out, width: 32}
    # S2 — sequence library: a longer random soak + a directed sweep of the
    # shift amount (walks amt = 0..31 while data_in/op stay random). `bs_smoke` is
    # a sequence-of-sequences that runs the amt walk, then the random soak.
    sequences:
      - {name: bs_rand,     kind: random,       count: 256}
      - {name: bs_amt_walk, kind: incrementing, count: 32, field: amt}
      - {name: bs_smoke,    kind: nested,       steps: [bs_amt_walk, bs_rand]}

tests:
  - name: rand_test
    num_items: 500
  - name: amt_sweep            # runs bs_amt_walk (full 0..31 walk) instead of default
    sequence: {agent: bs, name: bs_amt_walk}
  - name: short_sweep          # S2: same sequence, count overridden to 8 (amt 0..7)
    sequence: {agent: bs, name: bs_amt_walk, count: 8}
  - name: smoke_test           # S2: nested sequence-of-sequences (walk, then soak)
    sequence: {agent: bs, name: bs_smoke}
