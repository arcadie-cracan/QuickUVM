# Local fast loop mirroring CI. Install: pip install -e ".[dev]" && pre-commit install
# See docs/style_python.md.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff            # lint
        args: [--fix]
      - id: ruff-format     # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^quick_uvm/
        additional_dependencies: ["pydantic>=2.0"]
