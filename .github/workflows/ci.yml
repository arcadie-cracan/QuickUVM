name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Generator codebase: lint, format, type-check, unit tests ──────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: mypy
        run: mypy
      - name: pytest
        run: pytest -q

  # ── Generated SystemVerilog: must be Verible-lint-clean and formatted ─────
  # Hard gate on the *product*: every release ships UVM that passes a standard
  # public linter. See docs/style_systemverilog.md.
  #
  # NB: only verible-verilog-LINT is gated. verible-verilog-format is deliberately
  # NOT used — it fights the Paradigm-Works column alignment we adopted as the
  # baseline and (as of v0.0-4053) corrupts `uvm_*` macro calls lacking a trailing
  # ';' (drops their arguments and emits unparseable output). Formatting style is
  # enforced via the lint rules + docs/style_systemverilog.md instead.
  generated-sv:
    runs-on: ubuntu-latest
    env:
      # Pin a known-good Verible release; bump deliberately.
      VERIBLE_VERSION: v0.0-4053-g89d4d98a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e .

      - name: Install Verible
        run: |
          url="https://github.com/chipsalliance/verible/releases/download/${VERIBLE_VERSION}/verible-${VERIBLE_VERSION}-linux-static-x86_64.tar.gz"
          curl -fsSL "$url" | tar -xz
          echo "$PWD/verible-${VERIBLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Generate the example testbench
        run: quick-uvm generate -c examples/simple_reg/simple_reg.yaml -o gen_tb

      - name: Verible lint (generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_tb/*.sv gen_tb/*.svh

      # Also gate the S1 enum path (typed transaction fields): the alu example
      # exercises a generated `<name>_e` typedef, a typed `rand` field, the
      # logic->enum monitor `$cast`, and enum-aware coverpoints — none of which
      # the plain simple_reg config covers.
      - name: Generate the enum-field example (S1)
        run: quick-uvm generate -c examples/alu/alu.yaml -o gen_alu

      - name: Verible lint (enum-path generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_alu/*.sv gen_alu/*.svh

      # Gate the S2 sequence-library path: the barrel_shifter example generates a
      # random + incrementing library sequence and a test that selects one.
      - name: Generate the sequence-library example (S2)
        run: quick-uvm generate -c examples/barrel_shifter/barrel_shifter.yaml -o gen_bs

      - name: Verible lint (sequence-library generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_bs/*.sv gen_bs/*.svh

      # Gate the C2 virtual-sequence path: the multi-agent fifo example generates
      # env_vsqr / env_vseq_base / sequential + parallel virtual sequences and a
      # two-interface DUT connection.
      - name: Generate the multi-agent example (C2)
        run: quick-uvm generate -c examples/fifo/fifo.yaml -o gen_fifo

      - name: Verible lint (virtual-sequence generated SV/SVH)
        run: |
          verible-verilog-lint --rules_config .verible-lint.rules gen_fifo/*.sv gen_fifo/*.svh
