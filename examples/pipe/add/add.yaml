# add — pipeline stage 1 (dout = din + 1). Active agent drives din.
project: {name: add, author: QuickUVM, year: 2026}
dut: {name: add, clock: clk, reset: '', combinational: true}
clock: {period: 10, unit: ns}
agents:
  - name: a
    interface: a_if
    sequence_item: a_seq_item
    ports:
      inputs:  [{name: din,  width: 8}]
      outputs: [{name: dout, width: 8}]
tests:
  - {name: add_test, num_items: 30}
