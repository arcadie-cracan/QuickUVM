project:
  name: sat_adder_tb
  author: qa@example.com

# K0 example: the scoreboard's golden model is written in C and called via DPI-C.
# A combinational saturating adder — `reference_model.language: c` makes QuickUVM
# generate a DPI-C bridge (sat_adder_reference_model.svh) + a C stub
# (sat_adder_reference_model.c, the only file the user edits).
dut:
  name: sat_adder
  clock: clk
  reset: ''
  combinational: true

clock:
  period: 10
  unit: ns

agents:
  - name: add
    interface: add_if
    sequence_item: add_seq_item
    seq_item_style: manual
    active: true
    ports:
      inputs:
        - {name: a, width: 8}
        - {name: b, width: 8}
      outputs:
        - {name: sum, width: 8}
        - {name: ovf, width: 1}

# The reference model lives ON the scoreboard it configures: language: c makes
# QuickUVM generate the DPI-C bridge + C stub for THIS scoreboard's predict().
analysis:
  coverage: [add]
  scoreboards:
    - {name: sbd, source: add, reference_model: {language: c}}

tests:
  - name: rand_test
    num_items: 200
